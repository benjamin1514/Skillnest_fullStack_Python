<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesión / Registro</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: sans-serif;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .card {
            background: #ffffff;
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 2.5rem;
            display: grid;
            grid-template-columns: 1fr 1px 1fr;
            gap: 2.5rem;
            align-items: start;
            max-width: 700px;
            width: 100%;
        }

        .divider {
            background: #ddd;
            height: 100%;
            min-height: 220px;
        }

        h2 {
            font-size: 22px;
            font-weight: 500;
            margin-bottom: 1.5rem;
            color: #111;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        label {
            font-size: 13px;
            color: #666;
        }

        input {
            width: 100%;
            height: 36px;
            padding: 0 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #888;
        }

        button {
            margin-top: 4px;
            padding: 8px 20px;
            background: transparent;
            border: 1px solid #999;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #f0f0f0;
        }

        button:active {
            transform: scale(0.98);
        }
    </style>
</head>

<body>

    <div class="card">

        <!-- Inicio de Sesión -->
        <div>
            <h2>Inicio de sesión</h2>
            <div class="form-group">
                <div class="field">
                    <label for="login-email">E-mail</label>
                    <input type="email" id="login-email" placeholder="correo@ejemplo.com">
                </div>
                <div class="field">
                    <label for="login-password">Contraseña</label>
                    <input type="password" id="login-password" placeholder="••••••••">
                </div>
                <div>
                    <button>Iniciar sesión</button>
                </div>
            </div>
        </div>

        <!-- Divisor -->
        <div class="divider"></div>

        <!-- Registro -->
        <div>
            <h2>Registro</h2>
            <div class="form-group">
                <div class="field">
                    <label for="reg-nombre">Nombre</label>
                    <input type="text" id="reg-nombre" placeholder="Tu nombre">
                </div>
                <div class="field">
                    <label for="reg-email">E-mail</label>
                    <input type="email" id="reg-email" placeholder="correo@ejemplo.com">
                </div>
                <div class="field">
                    <label for="reg-password">Contraseña</label>
                    <input type="password" id="reg-password" placeholder="••••••••">
                </div>
                <div class="field">
                    <label for="reg-confirm">Conf. contraseña</label>
                    <input type="password" id="reg-confirm" placeholder="••••••••">
                </div>
                <div>
                    <button>Registrar</button>
                </div>
            </div>
        </div>

    </div>

</body>

</html>
