<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesión / Registro</title>
    <link rel="stylesheet" href="static/css/style.css">
</head>

<body>

    <div class="card">

        <!-- Inicio de Sesión -->
        <div>
            <h2>Inicio de sesión</h2>
            <div class="form-group">
                <div class="field">
                    <label for="login-email">E-mail</label>
                    <input type="email" id="login-email" placeholder="correo@ejemplo.com">
                </div>
                <div class="field">
                    <label for="login-password">Contraseña</label>
                    <input type="password" id="login-password" placeholder="••••••••">
                </div>
                <div>
                    <button>Iniciar sesión</button>
                </div>
            </div>
        </div>

        <!-- Divisor -->
        <div class="divider"></div>

        <!-- Registro -->
        <div>
            <h2>Registro</h2>
            <div class="form-group">
                <div class="field">
                    <label for="reg-nombre">Nombre</label>
                    <input type="text" id="reg-nombre" placeholder="Tu nombre">
                </div>
                <div class="field">
                    <label for="reg-email">E-mail</label>
                    <input type="email" id="reg-email" placeholder="correo@ejemplo.com">
                </div>
                <div class="field">
                    <label for="reg-password">Contraseña</label>
                    <input type="password" id="reg-password" placeholder="••••••••">
                </div>
                <div class="field">
                    <label for="reg-confirm">Conf. contraseña</label>
                    <input type="password" id="reg-confirm" placeholder="••••••••">
                </div>
                <div>
                    <button>Registrar</button>
                </div>
            </div>
        </div>

    </div>

</body>

</html>
