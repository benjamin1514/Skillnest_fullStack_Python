<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Usuario</title>
    <link rel="stylesheet" href="css/dashboard_usuarios.css">
</head>
<body>

    <div class="container">
        <h1>Nuevo Usuario</h1>
        
        <form class="user-form">
            <div class="form-group">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" name="nombre">
            </div>

            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email">
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password">
            </div>

            <div class="form-group">
                <label for="conf-password">Conf. Contraseña</label>
                <input type="password" id="conf-password" name="conf-password">
            </div>

            <div class="form-group">
                <label for="tipo-usuario">Tipo de Usuario</label>
                <div class="select-wrapper">
                    <select id="tipo-usuario" name="tipo-usuario">
                        <option value="administrador">Administrador</option>
                        <option value="usuario">Usuario</option>
                    </select>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-submit">Crear</button>
            </div>
        </form>
    </div>

</body>
</html>
